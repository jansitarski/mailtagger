# mailtagger configuration for docker-compose.
# All duration fields accept Go duration strings ("5m", "30s", "1h").
# ${VAR} references are expanded from the environment (see docker-compose.yml).

llm:
  provider: openai
  model: gpt-4o-mini
  api_key: ${OPENAI_API_KEY}
  base_url: ""
  temperature: 0.1
  max_tokens: 200
  timeout: 30s

poll_interval: 30s

store:
  type: sqlite
  path: /var/lib/mailtagger/state.db

http:
  addr: ":8080"
  read_timeout: 10s
  write_timeout: 10s
  metrics_enabled: true

log:
  level: info
  format: json

categories:
  - name: Work
    label: AI/Work
    description: "Jobs, coworkers, meetings, projects, professional tasks"
  - name: Personal
    label: AI/Personal
    description: "Friends, family, general personal life"
  - name: Finance
    label: AI/Finance
    description: "Banks, invoices, receipts, bills, payment confirmations"
  - name: Shopping
    label: AI/Shopping
    description: "Order confirmations, promotions, store updates"
  - name: Travel
    label: AI/Travel
    description: "Booking confirmations, tickets, hotels, itineraries"
  - name: Newsletters
    label: AI/Newsletters
    description: "Recurring marketing or subscription emails"
  - name: System
    label: AI/System
    description: "One-time codes, activations, registrations"
  - name: Alerts
    label: AI/Alerts
    description: "Security or change notifications about accounts/infrastructure"
  # Required fallback category (must be named exactly "Others").
  - name: Others
    label: AI/Others
    description: "Relevant emails that don't clearly fit elsewhere"
