# Default values for mailtagger.
# This is a YAML-formatted file.

# Image configuration
image:
  repository: ghcr.io/jansitarski/mailtagger
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Service account configuration
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

# Service configuration
service:
  type: ClusterIP
  port: 8080

# Ingress configuration (for push mode webhook)
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: mailtagger.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: mailtagger-tls
  #    hosts:
  #      - mailtagger.local

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Persistence for SQLite database
persistence:
  enabled: true
  # Use an existing PVC instead of creating one
  existingClaim: ""
  # Storage class for dynamic provisioning
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  # Annotations for the PVC
  annotations: {}

# mailtagger configuration
config:
  # LLM provider configuration
  llm:
    provider: openai
    model: gpt-4-turbo
    # API key is stored in secret, referenced via environment variable
    # apiKey is not set here - use secret.llmApiKey instead
    baseUrl: ""
    temperature: 0.1
    maxTokens: 200
    timeout: "30s"

  # Poll interval for Gmail
  pollInterval: 5m

  # HTTP server configuration
  http:
    addr: ":8080"
    readTimeout: 10s
    writeTimeout: 10s
    metricsEnabled: true

  # Logging configuration
  log:
    level: info
    format: json

  # Email categories for classification
  categories:
    - name: newsletter
      label: automated/newsletter
      description: Marketing emails, promotional content, newsletters
    - name: receipt
      label: automated/receipt
      description: Purchase confirmations, order receipts, invoices
    - name: notification
      label: automated/notification
      description: Service notifications, alerts, automated messages
    - name: personal
      label: automated/personal
      description: Personal correspondence from individuals

# Secrets configuration
secret:
  # Create a secret with the values below, or use an existing secret
  create: true
  # Name of an existing secret to use (if create is false)
  existingSecret: ""
  
  # LLM API key (required unless using Ollama)
  llmApiKey: ""
  
  # 32-byte encryption key in hex (64 characters)
  # Generate with: openssl rand -hex 32
  encryptionKey: ""
  
  # OAuth client secret JSON (base64 encoded)
  # Get this from Google Cloud Console
  clientSecretJson: ""

# Prometheus ServiceMonitor (requires prometheus-operator)
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  annotations: {}

# Network policy
networkPolicy:
  enabled: false
  # Allow ingress from these namespaces (for Prometheus scraping)
  ingressNamespaces: []
  # Additional egress rules (e.g., for self-hosted LLM providers like Ollama)
  # additionalEgress:
  #   - ports:
  #       - protocol: TCP
  #         port: 11434
  #     to:
  #       - podSelector:
  #           matchLabels:
  #             app: ollama
  additionalEgress: []
