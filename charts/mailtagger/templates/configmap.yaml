apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mailtagger.fullname" . }}
  labels:
    {{- include "mailtagger.labels" . | nindent 4 }}
data:
  config.yaml: |
    # mailtagger configuration - generated by Helm
    
    llm:
      provider: {{ .Values.config.llm.provider | quote }}
      model: {{ .Values.config.llm.model | quote }}
      api_key: ${LLM_API_KEY}
      {{- if .Values.config.llm.baseUrl }}
      base_url: {{ .Values.config.llm.baseUrl | quote }}
      {{- end }}
      temperature: {{ .Values.config.llm.temperature }}
      max_tokens: {{ .Values.config.llm.maxTokens }}
      timeout: {{ .Values.config.llm.timeout | quote }}
    
    poll_interval: {{ .Values.config.pollInterval | quote }}
    
    store:
      type: sqlite
      path: /var/lib/mailtagger/state.db
    
    http:
      addr: {{ .Values.config.http.addr | quote }}
      read_timeout: {{ .Values.config.http.readTimeout | quote }}
      write_timeout: {{ .Values.config.http.writeTimeout | quote }}
      metrics_enabled: {{ .Values.config.http.metricsEnabled }}
    
    log:
      level: {{ .Values.config.log.level | quote }}
      format: {{ .Values.config.log.format | quote }}
    
    categories:
    {{- range .Values.config.categories }}
      - name: {{ .name | quote }}
        label: {{ .label | quote }}
        description: |
          {{ .description | nindent 10 | trim }}
    {{- end }}
