{{- if .Values.secret.create }}
{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (include "mailtagger.fullname" .)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mailtagger.fullname" . }}
  labels:
    {{- include "mailtagger.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secret.encryptionKey }}
  encryption-key: {{ .Values.secret.encryptionKey | b64enc | quote }}
  {{- else if and $existingSecret (index ($existingSecret.data | default dict) "encryption-key") }}
  encryption-key: {{ index $existingSecret.data "encryption-key" }}
  {{- else }}
  {{- /* Generate a valid 64-char hex string (sha256sum always produces hex) */}}
  encryption-key: {{ randAlphaNum 32 | sha256sum | b64enc | quote }}
  {{- end }}
  {{- if .Values.secret.llmApiKey }}
  llm-api-key: {{ .Values.secret.llmApiKey | b64enc | quote }}
  {{- else if and $existingSecret (index ($existingSecret.data | default dict) "llm-api-key") }}
  llm-api-key: {{ index $existingSecret.data "llm-api-key" }}
  {{- end }}
  {{- if .Values.secret.clientSecretJson }}
  client-secret-json: {{ .Values.secret.clientSecretJson | quote }}
  {{- else if and $existingSecret (index ($existingSecret.data | default dict) "client-secret-json") }}
  client-secret-json: {{ index $existingSecret.data "client-secret-json" }}
  {{- else }}
  # Placeholder - replace with actual client_secret.json content (base64 encoded)
  client-secret-json: {{ "{}" | b64enc | quote }}
  {{- end }}
{{- end }}
